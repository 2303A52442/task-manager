<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e1e2e; border: 1px solid #2d2d44; border-radius: 16px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        .card h2 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
        .form-group input { background: #12121f; border: 1px solid #2d2d44; border-radius: 10px; padding: 14px 16px; color: #e2e8f0; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #7c3aed; }
        .btn-submit { background: linear-gradient(135deg, #7c3aed, #3b82f6); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        .btn-submit:hover { opacity: 0.9; }
        .links { margin-top: 20px; font-size: 0.9rem; }
        .links a { color: #60a5fa; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .flash { color: #f87171; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 Login</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/login" method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required />
                <input type="password" name="password" placeholder="Password" required />
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>
        <div class="links">
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>
</body>
</html>
