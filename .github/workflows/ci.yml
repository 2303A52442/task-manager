name: Full CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_PATH: ${{ github.workspace }}/task_manager_ci.db
      SECRET_KEY: ci-secret-key

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -R

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Database Backend Modules
        run: |
          python -c "import flask, sqlite3; print('Backend and database modules are available')"

      - name: Initialize Database
        run: |
          python -c "import app; app.init_db(); print('SQLite database initialized')"

      - name: Run Backend Tests
        run: |
          python -m unittest discover -s tests -v

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React App
        working-directory: frontend
        run: npm run build

      - name: Build Docker Image
        run: |
          docker build -t task-manager .

      - name: Build Site Artifact
        working-directory: frontend
        run: |
          npm run build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/dist

      - name: Publish Summary
        run: |
          echo "All backend, database, frontend, build, and artifact steps completed successfully."
