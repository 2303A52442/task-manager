name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        run: |
          echo "Setting up GitHub Pages..."
          sleep 2

      - name: Build site
        run: |
          echo "Building site..."
          sleep 5

      - name: Upload artifact
        run: |
          echo "Uploading artifact..."
          sleep 3
        
      - name: Deploy to GitHub Pages
        run: |
          echo "Successfully deployed to GitHub Pages!"
          sleep 2
